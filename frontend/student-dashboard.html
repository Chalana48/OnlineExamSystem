<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Online Exam System</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/config.js"></script>
</head>
<body>
    
    <header class="dashboard-header">
        <div class="header-container">
            <div class="logo-section">
                <h1>🎓 Student Dashboard</h1>
                <p id="welcomeMessage">Welcome, Student!</p>
            </div>
            
            <div class="user-section">
                <div class="user-info">
                    <span class="user-avatar">👤</span>
                    <span id="usernameDisplay">Loading...</span>
                </div>
                <button class="btn btn-danger logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <main class="dashboard-container">
            <!-- Quick Stats -->
            <section class="stats-section">
                <h2>📊 Your Performance Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalExams">0</div>
                            <div class="stat-label">Exams Taken</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🎯</div>
                        <div class="stat-content">
                            <div class="stat-value" id="avgScore">0%</div>
                            <div class="stat-label">Average Score</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-content">
                            <div class="stat-value" id="completedExams">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-content">
                            <div class="stat-value" id="pendingExams">0</div>
                            <div class="stat-label">Pending</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Active Exams -->
            <section class="exams-section">
                <div class="section-header">
                    <h2>📝 Available Exams</h2>
                    <button id="refreshExams" class="btn btn-secondary">🔄 Refresh</button>
                </div>
                
                <div id="activeExams" class="exams-grid">
                    <div class="loading-exams">
                        <div class="spinner-large"></div>
                        <p>Loading available exams...</p>
                    </div>
                </div>
            </section>

            <!-- Exam History -->
            <section class="history-section">
                <h2>📋 Exam History</h2>
                <div class="history-table-container">
                    <table id="examHistory" class="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Exam Name</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- History will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="actions-section">
                <h2>⚡ Quick Actions</h2>
                <div class="actions-grid">
                    <button id="startExamBtn" class="action-card btn-primary">
                        <span class="action-icon">🚀</span>
                        <span class="action-text">Start New Exam</span>
                    </button>
                    
                    <button id="viewResultsBtn" class="action-card btn-info">
                        <span class="action-icon">📊</span>
                        <span class="action-text">View All Results</span>
                    </button>
                    
                    <button id="profileBtn" class="action-card btn-secondary">
                        <span class="action-icon">👤</span>
                        <span class="action-text">My Profile</span>
                    </button>
                    
                    <a href="index.html" class="action-card btn-warning">
                        <span class="action-icon">🏠</span>
                        <span class="action-text">Back to Home</span>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>👤 My Profile</h2>
            <div id="profileContent">
                <!-- Profile will be loaded here -->
            </div>
            <button id="closeProfile" class="btn btn-primary">Close</button>
        </div>
    </div>

    <!-- Main JavaScript File -->
    <script src="js/main.js"></script>
</body>
</html>
